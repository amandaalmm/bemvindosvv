<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escala Multi-Cultos 📅</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bem-Vindos">
  <link rel="icon" href="apple-touch-icon.png" type="image/png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { color: #2D3142; font-family: 'Inter', sans-serif; background-color: #F4F7FC; padding: 20px 15px; max-width: 600px; margin: 0 auto; }
    h2 { text-align: center; font-size: 20px; font-weight: 600; padding-top: 1rem; margin-bottom: 4px; }
    .subtitulo { text-align: center; font-size: 12px; color: #9095A0; margin-bottom: 16px; }
    .cartao { background: #FFFFFF; padding: 16px 18px; border-radius: 16px; border: 0.5px solid #E5E7EB; margin-bottom: 14px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); }

    .grupo { margin-bottom: 14px; }
    .grupo:last-child { margin-bottom: 0; }
    .grupo-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 0.5px solid #E5E7EB; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .grupo-header span { font-size: 12px; font-weight: 600; }
    .grupo-header .info { font-size: 10px; color: #9095A0; margin-left: auto; }
    .slots { display: flex; flex-wrap: wrap; gap: 8px; }
    .slot { flex: 1 1 44%; min-width: 120px; display: flex; flex-direction: column; gap: 3px; }
    .slot label { font-size: 10px; color: #9095A0; font-weight: 600; }
    .slot select { padding: 8px 10px; border: 1px solid #ccc; border-left-width: 3px; border-radius: 10px; background: #fff; font-size: 13px; font-weight: 600; color: #2D3142; }
    .divider { height: 0.5px; background: #E5E7EB; margin: 14px 0; }
    .badge { font-size: 10px; background: #f0f3ff; border: 0.5px solid #4A60FF; border-radius: 20px; padding: 2px 8px; color: #4A60FF; margin-left: 6px; font-weight: 600; }

    /* Salão */
    .salao-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .salao-header h3 { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .btn-limpar { background: transparent; color: #9095A0; border: 1px solid #E5E7EB; border-radius: 10px; padding: 6px 10px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .btn-gerar  { background: #4A60FF; color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 600; width: 100%; margin-top: 10px; cursor: pointer; box-shadow: 0 6px 15px rgba(74,96,255,0.3); }

    /* Chips selecionados */
    .chips-selecionados { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .chip-sel { display: flex; align-items: center; gap: 5px; padding: 4px 10px 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; background: #4A60FF; color: #fff; }
    .chip-sel .rem { cursor: pointer; font-size: 15px; line-height: 1; opacity: 0.75; margin-left: 2px; }
    .chip-sel .rem:hover { opacity: 1; }

    /* Dropdown retrátil */
    .dropdown-wrap { position: relative; margin-bottom: 10px; }
    .dropdown-trigger { width: 100%; padding: 10px 14px; border: 1.5px dashed #C7D0FF; border-radius: 12px; background: #f8f9ff; color: #4A60FF; font-size: 13px; font-weight: 600; cursor: pointer; user-select: none; display: flex; align-items: center; justify-content: space-between; -webkit-tap-highlight-color: transparent; }
    .dropdown-trigger:active { background: #eef0ff; }
    .dropdown-arrow { font-size: 11px; transition: transform 0.2s; }
    .dropdown-trigger.aberto .dropdown-arrow { transform: rotate(180deg); }
    .dropdown-painel { display: none; border: 1px solid #E5E7EB; border-radius: 12px; background: #fff; padding: 12px; margin-top: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .dropdown-painel.aberto { display: block; }
    .secao-label { font-size: 10px; font-weight: 600; color: #9095A0; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 7px; margin-top: 10px; }
    .secao-label:first-child { margin-top: 0; }
    .chips-lista { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
    .chip-nome { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; user-select: none; transition: all 0.15s; border: 1px solid #E5E7EB; background: #F4F7FC; color: #9095A0; -webkit-tap-highlight-color: transparent; }
    .chip-nome:active { transform: scale(0.95); }
    .chip-nome.on  { background: #4A60FF; color: #fff; border-color: #4A60FF; }
    .chip-nome.ind { opacity: 0.3; pointer-events: none; text-decoration: line-through; }

    /* Botão distribuir */
    .dist-footer { margin-top: 14px; padding-top: 12px; border-top: 1px solid #E5E7EB; }
    .btn-dist-panel { width: 100%; padding: 12px; background: #4A60FF; color: #fff; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 12px rgba(74,96,255,0.35); transition: opacity 0.15s; }
    .btn-dist-panel:active { opacity: 0.85; }

    /* Resultado */
    .area-resultado { text-align: center; display: none; }
    .area-resultado img { max-width: 100%; border-radius: 12px; margin-top: 10px; }
    canvas { display: none; }

    /* ===== PAINEL DE GESTÃO DE MEMBROS ===== */
    .btn-gestao { 
      display: block; width: 100%; padding: 10px; margin-bottom: 14px;
      background: transparent; border: 1px solid #E5E7EB; border-radius: 12px;
      font-size: 13px; font-weight: 600; color: #9095A0; cursor: pointer;
      text-align: center; letter-spacing: 0.01em;
    }
    .btn-gestao:active { background: #f4f7fc; }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: flex-end; justify-content: center; }
    .modal-overlay.aberto { display: flex; }
    .modal { background: #fff; border-radius: 24px 24px 0 0; width: 100%; max-width: 600px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
    .modal-header { padding: 16px 18px 12px; border-bottom: 0.5px solid #E5E7EB; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .modal-header h3 { font-size: 16px; font-weight: 700; }
    .btn-fechar { background: #f4f7fc; border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #9095A0; }
    .modal-body { overflow-y: auto; padding: 16px 18px; flex: 1; }
    .modal-footer { padding: 12px 18px 20px; border-top: 0.5px solid #E5E7EB; flex-shrink: 0; }

    /* Adicionar membro */
    .add-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .add-row input { flex: 1; padding: 10px 12px; border: 1.5px solid #E5E7EB; border-radius: 10px; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; }
    .add-row input:focus { border-color: #4A60FF; }
    .btn-add { background: #4A60FF; color: #fff; border: none; border-radius: 10px; padding: 10px 16px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }

    /* Lista de membros no modal */
    .membro-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid #f0f0f0; }
    .membro-item:last-child { border-bottom: none; }
    .membro-nome { flex: 1; font-size: 14px; font-weight: 500; }
    .membro-nome.homem { color: #3b82f6; }
    .tag-lider { font-size: 10px; font-weight: 700; background: #dbeafe; color: #1e3a8a; border-radius: 20px; padding: 2px 8px; }
    .tag-homem { font-size: 10px; font-weight: 700; background: #e0f2fe; color: #0369a1; border-radius: 20px; padding: 2px 8px; }

    /* Toggles do membro */
    .membro-acoes { display: flex; gap: 6px; align-items: center; }
    .toggle-btn { font-size: 11px; font-weight: 600; border-radius: 20px; padding: 3px 10px; cursor: pointer; border: 1px solid; transition: all 0.15s; white-space: nowrap; }
    .toggle-lider.ativo   { background: #dbeafe; color: #1e3a8a; border-color: #3b82f6; }
    .toggle-lider.inativo { background: #f4f7fc; color: #9095A0; border-color: #E5E7EB; }
    .toggle-homem.ativo   { background: #e0f2fe; color: #0369a1; border-color: #38bdf8; }
    .toggle-homem.inativo { background: #f4f7fc; color: #9095A0; border-color: #E5E7EB; }
    .toggle-assess.ativo  { background: #dcfce7; color: #166534; border-color: #22c55e; }
    .toggle-assess.inativo{ background: #f4f7fc; color: #9095A0; border-color: #E5E7EB; }
    .btn-remover-membro { background: #fee2e2; color: #b91c1c; border: none; border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 600; cursor: pointer; }

    .confirmar-remocao {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      background: #fff5f5; border: 1px solid #fecaca; border-radius: 10px;
      padding: 8px 12px; margin-bottom: 6px; font-size: 12px; color: #7f1d1d;
    }
    .confirmar-remocao span { flex: 1; }
    .btn-conf-sim { background: #ef4444; color: #fff; border: none; border-radius: 8px; padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .btn-conf-nao { background: #f4f7fc; color: #9095A0; border: 1px solid #E5E7EB; border-radius: 8px; padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer; }

    .filtro-row { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
    .filtro-btn { padding: 7px 10px; border: 1px solid #E5E7EB; border-radius: 8px; font-size: 12px; font-weight: 600; background: #f4f7fc; color: #9095A0; cursor: pointer; }
    .filtro-btn.ativo { background: #4A60FF; color: #fff; border-color: #4A60FF; }

    /* Busca */
    .search-row { display: flex; align-items: center; gap: 8px; background: #f4f7fc; border: 1px solid #E5E7EB; border-radius: 10px; padding: 8px 12px; margin-bottom: 10px; }
    .search-icon { font-size: 14px; }
    .search-row input { flex: 1; border: none; background: transparent; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; color: #2D3142; }

    /* Adicionar embaixo */
    .add-section { margin-top: 16px; padding-top: 14px; border-top: 1px solid #E5E7EB; }
    .add-label { font-size: 11px; font-weight: 600; color: #9095A0; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  </style>
</head>
<body>

  <h2>Escala Multi-Cultos</h2>
  <p class="subtitulo">Ministério Bem-Vindos — Mananciais Vila Valqueire</p>

  <select id="seletorCulto" class="sel-culto" onchange="mudarCulto()"></select>

  <div class="cartao" id="cardFuncoes"></div>

  <div class="cartao">
    <div class="salao-header">
      <h3>Bem-Vindo Salão <span id="badgeSalao" class="badge">0 presentes</span></h3>
      <button class="btn-limpar" onclick="limparSalao()">Limpar tudo</button>
    </div>
    <div id="chipsSelecionados" class="chips-selecionados"></div>
    <div class="dropdown-wrap">
      <div class="dropdown-trigger" id="dropTrigger" onclick="toggleDropdown()">
        <span>👥 Selecionar presentes</span>
        <span class="dropdown-arrow">▼</span>
      </div>
      <div class="dropdown-painel" id="dropPainel">
        <div id="chipsSalaoLista" class="chips-lista"></div>
        <div class="dist-footer">
          <button class="btn-dist-panel" onclick="distribuirEFechar()">✨ Distribuir nas zonas</button>
        </div>
      </div>
    </div>
    <div class="divider"></div>
    <div id="formSalao" class="slots"></div>
    <button class="btn-gerar" onclick="gerarImagem()">Gerar imagem pronta</button>
  </div>

  <canvas id="meuCanvas"></canvas>
  <div class="cartao area-resultado" id="areaResultado">
    <p style="font-size:12px;color:#9095A0;margin-bottom:8px;">Pressione e segure para salvar no celular.</p>
    <img id="imagemFinal" src="" alt="Escala gerada">
  </div>

  <button class="btn-gestao" onclick="abrirGestao()">⚙️ Gerenciar membros do ministério</button>

  <!-- Modal gestão -->
  <div class="modal-overlay" id="modalOverlay" onclick="fecharSeForaModal(event)">
    <div class="modal">
      <div class="modal-header">
        <h3>👥 Membros do Ministério</h3>
        <button class="btn-fechar" onclick="fecharGestao()">×</button>
      </div>
      <div class="modal-body">

        <!-- Busca -->
        <div class="search-row">
          <span class="search-icon">🔍</span>
          <input id="inputBusca" type="text" placeholder="Buscar nome..." oninput="renderListaModal()">
        </div>

        <!-- Filtros -->
        <div class="filtro-row">
          <button class="filtro-btn ativo" id="filtroTodos"       onclick="setFiltro('todos')">Todos</button>
          <button class="filtro-btn"       id="filtroLideres"     onclick="setFiltro('lideres')">Líderes</button>
          <button class="filtro-btn"       id="filtroAssessoria"  onclick="setFiltro('assessoria')">Assessoria</button>
          <button class="filtro-btn"       id="filtroHomens"      onclick="setFiltro('homens')">Homens</button>
          <button class="filtro-btn"       id="filtroMulheres"    onclick="setFiltro('mulheres')">Mulheres</button>
        </div>

        <div id="listaMembrosModal"></div>

        <!-- Adicionar embaixo — oculto nos filtros Líderes e Assessoria -->
        <div class="add-section" id="addSection">
          <p class="add-label">Adicionar novo membro</p>
          <div class="add-row">
            <input id="inputNovoNome" type="text" placeholder="Nome completo..." onkeydown="if(event.key==='Enter') adicionarMembro()">
            <button class="btn-add" onclick="adicionarMembro()">+ Adicionar</button>
          </div>
        </div>

      </div>
      <div class="modal-footer">
        <p style="font-size:11px;color:#9095A0;text-align:center;">Alterações ficam visíveis para todos automaticamente.</p>
      </div>
    </div>
  </div>

<script>

  // ========== SUPABASE SYNC ==========
  const SB_URL  = 'https://fkpcavsecvhxvojajgjo.supabase.co';
  const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrcGNhdnNlY3ZoeHZvamFqZ2pvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNjIwMTgsImV4cCI6MjA5MzczODAxOH0.cnJsyprHwx6WfeBGEdurUJ6rAy9nztS2rmJzrjys_6E';
  const SB_HDR  = { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` };

  async function carregarMembrosDB(){
    try {
      const r = await fetch(`${SB_URL}/rest/v1/membros?select=dados&order=id.desc&limit=1`, { headers: SB_HDR });
      if(!r.ok) throw new Error('erro leitura');
      const rows = await r.json();
      if(rows.length === 0) return null;
      return typeof rows[0].dados === 'string' ? JSON.parse(rows[0].dados) : rows[0].dados;
    } catch(e){ console.error('Erro ao carregar:', e); return null; }
  }

  async function salvarMembrosDB(){
    try {
      // Apaga registro antigo e insere novo (upsert simples)
      await fetch(`${SB_URL}/rest/v1/membros`, {
        method: 'DELETE',
        headers: { ...SB_HDR, 'Prefer': 'return=minimal' }
      });
      const r = await fetch(`${SB_URL}/rest/v1/membros`, {
        method: 'POST',
        headers: { ...SB_HDR, 'Prefer': 'return=minimal' },
        body: JSON.stringify({ dados: JSON.stringify(membros) })
      });
      if(!r.ok) throw new Error(await r.text());
      mostrarStatus('✓ Salvo para todos', '#22c55e');
    } catch(e){
      mostrarStatus('⚠ Erro ao salvar', '#ef4444');
      console.error('Erro ao salvar:', e);
    }
  }

  function mostrarStatus(msg, cor){
    let el = document.getElementById('statusSync');
    if(!el){
      el = document.createElement('div');
      el.id = 'statusSync';
      el.style.cssText = 'position:fixed;bottom:20px;right:20px;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;color:#fff;z-index:999;transition:opacity 0.5s;';
      document.body.appendChild(el);
    }
    el.textContent = msg;
    el.style.background = cor;
    el.style.opacity = '1';
    setTimeout(() => el.style.opacity = '0', 2500);
  }

  // ========== PERSISTÊNCIA ==========
  function carregarMembros(){
    try {
      const s = localStorage.getItem('membros_ministerio');
      return s ? JSON.parse(s) : JSON.parse(JSON.stringify(MEMBROS_BASE));
    } catch(e){ return JSON.parse(JSON.stringify(MEMBROS_BASE)); }
  }

  async function salvarMembros(){
    localStorage.setItem('membros_ministerio', JSON.stringify(membros));
    reconstruirListas();
    mudarCulto();
    mostrarStatus('Salvando...', '#9095A0');
    await salvarMembrosDB();
  }

  let membros = carregarMembros();

  // Ao iniciar, carrega do Supabase (versão compartilhada por todos)
  carregarMembrosDB().then(dados => {
    if(dados && dados.length > 0){
      membros = dados;
      localStorage.setItem('membros_ministerio', JSON.stringify(membros));
      reconstruirListas();
      mudarCulto();
    }
  });

  // ========== LISTAS DERIVADAS ==========
  function getMembros()    { return membros.map(m=>m.nome).sort(); }
  function getLideres()    { return membros.filter(m=>m.lider).map(m=>m.nome).sort(); }
  function getAssessoria() { return membros.filter(m=>m.assessoria && !m.homem).map(m=>m.nome).sort(); }
  function getHomensSet()  { return new Set(membros.filter(m=>m.homem).map(m=>m.nome)); }

  let MEMBROS_LISTA  = getMembros();
  let LISTA_LIDER    = getLideres();
  let LISTA_ASSESS   = getAssessoria();
  let HOMENS_SET     = getHomensSet();

  const FUNCOES = [
    { id:'assessoria', label:'Assessoria',          cor:'#22c55e', slots:1, grupo: LISTA_ASSESS },
    { id:'lider',      label:'Líder da Escala',     cor:'#3b82f6', slots:1, grupo: LISTA_LIDER },
    { id:'intendente', label:'Recepção Intendente', cor:'#ef4444', slots:2, grupo: MEMBROS_LISTA },
    { id:'quiririm',   label:'Recepção Quiririm',   cor:'#f97316', slots:2, grupo: MEMBROS_LISTA },
    { id:'apoio',      label:'Apoio Bem-Vindo',     cor:'#06b6d4', slots:4, grupo: MEMBROS_LISTA },
  ];

  function reconstruirListas(){
    MEMBROS_LISTA = getMembros();
    LISTA_LIDER   = getLideres();
    LISTA_ASSESS  = getAssessoria();
    HOMENS_SET    = getHomensSet();
    FUNCOES[0].grupo = LISTA_ASSESS;
    FUNCOES[1].grupo = LISTA_LIDER;
    FUNCOES[2].grupo = MEMBROS_LISTA;
    FUNCOES[3].grupo = MEMBROS_LISTA;
    FUNCOES[4].grupo = MEMBROS_LISTA;
  }

  let presSalao = {};
  function resetPresencas(){ MEMBROS_LISTA.forEach(n => presSalao[n] = false); }

  const CULTOS = [
    { value:'domingo1', label:'Domingo 1º Culto (18 Zonas)', salaoCount:9, imagem:'domingo1.jpg',
      zonas:{ assessoria:'Assessoria', lider:'Zona 18', intendente:['Zona 13','Zona 14'], quiririm:['Zona 15','Zona 17'], apoio:['Zona 10','Zona 11','Zona 12','Zona 16'], salao:Array.from({length:9},(_,i)=>`Zona ${i+1}`) }},
    { value:'domingo2', label:'Domingo 2º Culto (14 Zonas)', salaoCount:5, imagem:'domingo2.jpg',
      zonas:{ assessoria:'Assessoria', lider:'Zona 14', intendente:['Zona 9','Zona 10'], quiririm:['Zona 11','Zona 13'], apoio:['Zona 6','Zona 7','Zona 8','Zona 12'], salao:Array.from({length:5},(_,i)=>`Zona ${i+1}`) }},
    { value:'quarta', label:'Culto de Quarta (12 Zonas)', salaoCount:3, imagem:'quarta.jpg',
      zonas:{ assessoria:'Assessoria', lider:'Zona 12', intendente:['Zona 7','Zona 8'], quiririm:['Zona 9','Zona 11'], apoio:['Zona 4','Zona 5','Zona 6','Zona 10'], salao:Array.from({length:3},(_,i)=>`Zona ${i+1}`) }},
  ];

  const COORDS = {
    domingo1: { assessoria:{px:0.754,py:0.263}, lider:{px:0.770,py:0.831}, intendente:[{px:0.202,py:0.707},{px:0.770,py:0.707}], quiririm:[{px:0.200,py:0.767},{px:0.199,py:0.832}], apoio:[{px:0.770,py:0.576},{px:0.201,py:0.642},{px:0.770,py:0.638},{px:0.772,py:0.768}], salao:[{px:0.199,py:0.324},{px:0.770,py:0.322},{px:0.202,py:0.387},{px:0.770,py:0.387},{px:0.202,py:0.451},{px:0.771,py:0.450},{px:0.200,py:0.514},{px:0.773,py:0.512},{px:0.201,py:0.575}] },
    domingo2: { assessoria:{px:0.761,py:0.262}, lider:{px:0.772,py:0.716}, intendente:[{px:0.197,py:0.593},{px:0.770,py:0.590}], quiririm:[{px:0.195,py:0.656},{px:0.195,py:0.721}], apoio:[{px:0.776,py:0.462},{px:0.195,py:0.528},{px:0.772,py:0.530},{px:0.770,py:0.657}], salao:[{px:0.195,py:0.341},{px:0.773,py:0.338},{px:0.195,py:0.403},{px:0.774,py:0.406},{px:0.198,py:0.463}] },
    quarta:   { assessoria:{px:0.762,py:0.263}, lider:{px:0.768,py:0.735}, intendente:[{px:0.199,py:0.610},{px:0.769,py:0.609}], quiririm:[{px:0.202,py:0.673},{px:0.198,py:0.735}], apoio:[{px:0.769,py:0.482},{px:0.199,py:0.543},{px:0.770,py:0.544},{px:0.770,py:0.672}], salao:[{px:0.202,py:0.419},{px:0.773,py:0.416},{px:0.200,py:0.479}] },
  };

  const selCulto = document.getElementById('seletorCulto');
  CULTOS.forEach(c => selCulto.innerHTML += `<option value="${c.value}">${c.label}</option>`);

  function getCulto(){ return CULTOS.find(c=>c.value===selCulto.value); }
  function optsHtml(lista){ return `<option value="">— selecionar —</option>`+lista.sort().map(n=>`<option value="${n}">${n}</option>`).join(''); }
  function getZonaLabel(f,i,culto){ const z=culto.zonas[f.id]; return Array.isArray(z)?z[i]:z; }

  function jaUsados(){
    const s=new Set();
    FUNCOES.forEach(f=>{ for(let i=0;i<f.slots;i++){ const v=document.getElementById(`func_${f.id}_${i}`)?.value; if(v) s.add(v); }});
    return s;
  }

  function buildFuncoes(){
    const culto=getCulto(); let html='';
    FUNCOES.forEach((f,fi)=>{
      const zonaStr=Array.isArray(culto.zonas[f.id])?culto.zonas[f.id].join(', '):culto.zonas[f.id];
      html+=`<div class="grupo"><div class="grupo-header"><div class="dot" style="background:${f.cor}"></div><span>${f.label}</span><span class="info">${zonaStr}</span></div><div class="slots">`;
      for(let i=0;i<f.slots;i++) html+=`<div class="slot"><label>${getZonaLabel(f,i,culto)}</label><select id="func_${f.id}_${i}" style="border-left-color:${f.cor}">${optsHtml(f.grupo)}</select></div>`;
      html+=`</div></div>`;
      if(fi<FUNCOES.length-1) html+=`<div class="divider"></div>`;
    });
    document.getElementById('cardFuncoes').innerHTML=html;
  }

  function buildChips(){
    const usados = jaUsados();
    const c = document.getElementById('chipsSalaoLista'); c.innerHTML='';
    [...MEMBROS_LISTA].sort().forEach(n => {
      const on  = presSalao[n];
      const ind = usados.has(n);
      c.innerHTML += `<div class="chip-nome${on?' on':''}${ind?' ind':''}" onclick="toggleChip('${n}')">${n}</div>`;
    });
    renderChipsSelecionados();
    atualizarBadge();
  }

  function renderChipsSelecionados(){
    const sel = document.getElementById('chipsSelecionados');
    const nomesSel = MEMBROS_LISTA.filter(n=>presSalao[n]).sort();
    sel.innerHTML = nomesSel.length === 0 ? '' : nomesSel.map(n =>
      `<div class="chip-sel">${n}<span class="rem" onclick="desmarcar('${n}')">×</span></div>`
    ).join('');
  }

  function desmarcar(nome){ presSalao[nome]=false; buildChips(); buildSalaoSlots(true); }

  function toggleDropdown(){
    document.getElementById('dropTrigger').classList.toggle('aberto');
    document.getElementById('dropPainel').classList.toggle('aberto');
  }

  function toggleChip(nome){ presSalao[nome]=!presSalao[nome]; buildChips(); buildSalaoSlots(true); }

  function atualizarBadge(){
    const total = MEMBROS_LISTA.filter(n=>presSalao[n]).length;
    document.getElementById('badgeSalao').textContent = `${total} presentes`;
  }

  function buildSalaoSlots(manterValores){
    const culto=getCulto();
    const disp=MEMBROS_LISTA.filter(n=>presSalao[n]).sort();
    const opts=`<option value="">— selecionar —</option>`+disp.map(n=>`<option value="${n}">${n}</option>`).join('');
    const vals=[];
    if(manterValores) for(let i=0;i<culto.salaoCount;i++){const el=document.getElementById(`salao_${i}`);vals.push(el?el.value:'');}
    let html='';
    for(let i=0;i<culto.salaoCount;i++) html+=`<div class="slot"><label>${culto.zonas.salao[i]}</label><select id="salao_${i}" style="border-left-color:#888;border-left-width:3px">${opts}</select></div>`;
    document.getElementById('formSalao').innerHTML=html;
    if(manterValores) vals.forEach((v,i)=>{const el=document.getElementById(`salao_${i}`);if(el&&v)el.value=v;});
  }

  function mudarCulto(){
    resetPresencas();
    buildFuncoes();
    buildChips();
    buildSalaoSlots(false);
    document.getElementById('dropTrigger').classList.remove('aberto');
    document.getElementById('dropPainel').classList.remove('aberto');
  }

  function embaralhar(l){let c=[...l];for(let i=c.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[c[i],c[j]]=[c[j],c[i]];}return c;}

  function limparSalao(){
    const culto=getCulto();
    for(let i=0;i<culto.salaoCount;i++) document.getElementById(`salao_${i}`).value='';
    MEMBROS_LISTA.forEach(n=>presSalao[n]=false);
    buildChips();
    document.getElementById('dropTrigger').classList.remove('aberto');
    document.getElementById('dropPainel').classList.remove('aberto');
  }

  function distribuirEFechar(){ distribuirSalao(); document.getElementById('dropTrigger').classList.remove('aberto'); document.getElementById('dropPainel').classList.remove('aberto'); }

  function distribuirSalao(){
    const culto=getCulto();
    const usados=jaUsados();
    for(let i=0;i<culto.salaoCount;i++){const val=document.getElementById(`salao_${i}`).value;if(val)usados.add(val);}
    const disponiveis=MEMBROS_LISTA.filter(n=>presSalao[n]&&!usados.has(n));
    let H=embaralhar(disponiveis.filter(n=>HOMENS_SET.has(n)));
    let M=embaralhar(disponiveis.filter(n=>!HOMENS_SET.has(n)));
    const vagasIdx=[];
    for(let i=0;i<culto.salaoCount;i++){if(!document.getElementById(`salao_${i}`).value)vagasIdx.push(i);}
    const resultado={};
    let ih=0,im=0,hNaEsq=Math.random()<0.5;
    for(let v=0;v<vagasIdx.length;v+=2){
      const idxEsq=vagasIdx[v],idxDir=vagasIdx[v+1];
      if(idxDir!==undefined){
        const pEsq=hNaEsq?(ih<H.length?H[ih++]:im<M.length?M[im++]:null):(im<M.length?M[im++]:ih<H.length?H[ih++]:null);
        const pDir=hNaEsq?(im<M.length?M[im++]:ih<H.length?H[ih++]:null):(ih<H.length?H[ih++]:im<M.length?M[im++]:null);
        if(pEsq)resultado[idxEsq]=pEsq;
        if(pDir)resultado[idxDir]=pDir;
        hNaEsq=!hNaEsq;
      } else {
        const p=ih<H.length?H[ih++]:im<M.length?M[im++]:null;
        if(p)resultado[idxEsq]=p;
      }
    }
    let vazias=0;
    for(let i=0;i<culto.salaoCount;i++){const sel=document.getElementById(`salao_${i}`);if(!sel.value){if(resultado[i])sel.value=resultado[i];else vazias++;}}
    if(vazias>0)alert(`Aviso: ${vazias} vaga(s) vazias — marque mais presentes.`);
  }

  function gerarImagem(){
    const culto=getCulto(),coords=COORDS[culto.value];
    const canvas=document.getElementById('meuCanvas'),ctx=canvas.getContext('2d');
    const img=new Image();img.src=culto.imagem;
    img.onload=function(){
      canvas.width=img.width;canvas.height=img.height;ctx.drawImage(img,0,0);
      const W=canvas.width,H=canvas.height;
      ctx.font=`600 ${W*0.021}px Inter,Arial,sans-serif`;
      function escrever(nome,coord){
        if(!nome||!coord)return;
        const x=W*coord.px,y=H*coord.py,bw=W*0.17,bh=H*0.033;
        ctx.fillStyle='rgba(255,255,255,0.95)';ctx.beginPath();
        ctx.roundRect?ctx.roundRect(x,y-(bh/2),bw,bh,8):ctx.rect(x,y-(bh/2),bw,bh);
        ctx.fill();ctx.strokeStyle='rgba(74,96,255,0.3)';ctx.lineWidth=1.5;ctx.stroke();
        ctx.fillStyle='#2D3142';ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(nome,x+6,y);
      }
      FUNCOES.forEach(f=>{for(let i=0;i<f.slots;i++){const nome=document.getElementById(`func_${f.id}_${i}`)?.value;const c=coords[f.id];escrever(nome,Array.isArray(c)?c[i]:c);}});
      for(let i=0;i<culto.salaoCount;i++)escrever(document.getElementById(`salao_${i}`)?.value,coords.salao[i]);
      document.getElementById('imagemFinal').src=canvas.toDataURL('image/jpeg',0.9);
      const area=document.getElementById('areaResultado');area.style.display='block';area.scrollIntoView({behavior:'smooth'});
    };
    img.onerror=()=>alert(`Arquivo '${culto.imagem}' não encontrado.`);
  }

  // ========== GESTÃO DE MEMBROS ==========
  let filtroAtual = 'todos';

  function abrirGestao(){
    document.getElementById('modalOverlay').classList.add('aberto');
    document.getElementById('inputBusca').value='';
    renderListaModal();
  }
  function fecharGestao(){ document.getElementById('modalOverlay').classList.remove('aberto'); }
  function fecharSeForaModal(e){ if(e.target===document.getElementById('modalOverlay')) fecharGestao(); }

  function setFiltro(f){
    filtroAtual=f;
    ['todos','lideres','assessoria','homens','mulheres'].forEach(id=>{
      document.getElementById('filtro'+id.charAt(0).toUpperCase()+id.slice(1)).classList.toggle('ativo', id===f);
    });
    // Esconde o botão Adicionar nos filtros Líderes e Assessoria
    const ocultar = f==='lideres' || f==='assessoria';
    document.getElementById('addSection').style.display = ocultar ? 'none' : 'block';
    renderListaModal();
  }

  function renderListaModal(){
    const busca=(document.getElementById('inputBusca')?.value||'').toLowerCase().trim();
    let lista=[...membros].sort((a,b)=>a.nome.localeCompare(b.nome));
    if(filtroAtual==='lideres')    lista=lista.filter(m=>m.lider);
    if(filtroAtual==='assessoria') lista=lista.filter(m=>m.assessoria);
    if(filtroAtual==='homens')     lista=lista.filter(m=>m.homem);
    if(filtroAtual==='mulheres')   lista=lista.filter(m=>!m.homem);
    if(busca) lista=lista.filter(m=>m.nome.toLowerCase().includes(busca));
    const c=document.getElementById('listaMembrosModal');
    if(lista.length===0){
      c.innerHTML=`<p style="font-size:13px;color:#9095A0;text-align:center;padding:20px 0;">Nenhum membro encontrado.</p>`;
      return;
    }
    c.innerHTML=lista.map(m=>`
      <div class="membro-item" id="item_${encodeURIComponent(m.nome)}">
        <span class="membro-nome${m.homem?' homem':''}">${m.nome}</span>
        <div class="membro-acoes">
          <button class="toggle-btn toggle-homem ${m.homem?'ativo':'inativo'}"
            data-acao="homem" data-nome="${encodeURIComponent(m.nome)}">
            ${m.homem?'Homem':'Mulher'}
          </button>
          <button class="toggle-btn toggle-lider ${m.lider?'ativo':'inativo'}"
            data-acao="lider" data-nome="${encodeURIComponent(m.nome)}">
            ${m.lider?'★ Líder':'☆ Líder'}
          </button>
          ${!m.homem?`<button class="toggle-btn toggle-assess ${m.assessoria?'ativo':'inativo'}"
            data-acao="assessoria" data-nome="${encodeURIComponent(m.nome)}">
            ${m.assessoria?'✦ Assess.':'✧ Assess.'}</button>`:''}
          <button class="btn-remover-membro"
            data-acao="remover" data-nome="${encodeURIComponent(m.nome)}">Excluir</button>
        </div>
      </div>
      <div class="confirmar-remocao" id="conf_${encodeURIComponent(m.nome)}" style="display:none;">
        <span>Remover <strong>${m.nome}</strong>?</span>
        <button class="btn-conf-sim" data-acao="confirmar-remover" data-nome="${encodeURIComponent(m.nome)}">Sim, remover</button>
        <button class="btn-conf-nao" data-acao="cancelar-remover" data-nome="${encodeURIComponent(m.nome)}">Cancelar</button>
      </div>`).join('');
  }

  // Event delegation — sem confirm() que bloqueia em mobile
  document.getElementById('listaMembrosModal').addEventListener('click', function(e){
    const btn=e.target.closest('[data-acao]');
    if(!btn) return;
    const nomeEnc=btn.dataset.nome;
    const nome=decodeURIComponent(nomeEnc);
    const acao=btn.dataset.acao;

    if(acao==='remover'){
      // Mostra confirmação inline
      document.getElementById(`conf_${nomeEnc}`).style.display='flex';
      document.getElementById(`item_${nomeEnc}`).style.opacity='0.4';
      return;
    }
    if(acao==='cancelar-remover'){
      document.getElementById(`conf_${nomeEnc}`).style.display='none';
      document.getElementById(`item_${nomeEnc}`).style.opacity='1';
      return;
    }
    if(acao==='confirmar-remover'){
      membros=membros.filter(x=>x.nome!==nome);
      salvarMembros();
      renderListaModal();
      return;
    }

    const m=membros.find(x=>x.nome===nome);
    if(!m) return;
    if(acao==='lider'){
      m.lider=!m.lider;
    } else if(acao==='homem'){
      m.homem=!m.homem;
      if(m.homem) m.assessoria=false;
    } else if(acao==='assessoria'){
      if(!m.homem) m.assessoria=!m.assessoria;
    }
    salvarMembros();
    renderListaModal();
  });

  function adicionarMembro(){
    const input=document.getElementById('inputNovoNome');
    const nome=input.value.trim();
    if(!nome){input.focus();return;}
    if(membros.find(m=>m.nome.toLowerCase()===nome.toLowerCase())){alert('Este nome já existe na lista.');return;}
    membros.push({nome, homem:false, lider:false, assessoria:false});
    input.value='';
    salvarMembros();
    renderListaModal();
  }

  // Init
  resetPresencas();
  mudarCulto();
</script>
</body>
</html>
